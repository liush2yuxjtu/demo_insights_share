# tmux.noob.conf — 面向 tmux 新手的极简配置
# 设计目标：用户只用鼠标和 F12，不需要记任何快捷键

# 鼠标点击切换 pane、调窗口大小、滚动
set -g mouse on

# ── 拖选即复制到系统剪贴板 ───────────────────────────
# 默认 `mouse on` 下，拖选内容只进 tmux buffer，不进 macOS 剪贴板，
# 导致用户在别的窗口 Cmd+V 粘不到。这里把拖选松开绑到 pbcopy，
# 选择一松开就自动复制，并退出 copy-mode（符合 noob 直觉）。
# 两种 copy-mode 都绑，不管用户是 emacs 还是 vi key table。
if-shell 'command -v pbcopy' {
  bind -T copy-mode     MouseDragEnd1Pane send -X copy-pipe-and-cancel 'pbcopy'
  bind -T copy-mode-vi  MouseDragEnd1Pane send -X copy-pipe-and-cancel 'pbcopy'
} {
  # Linux 退路：有 xclip 就用 xclip，没有则退回默认行为
  if-shell 'command -v xclip' {
    bind -T copy-mode     MouseDragEnd1Pane send -X copy-pipe-and-cancel 'xclip -selection clipboard -in'
    bind -T copy-mode-vi  MouseDragEnd1Pane send -X copy-pipe-and-cancel 'xclip -selection clipboard -in'
  }
}
# OSC 52 备份路径（终端如果支持，会自动把 tmux buffer 写进系统剪贴板）
set -g set-clipboard on

# 终端色彩
set -g default-terminal "screen-256color"

# 顶部状态栏，常驻提示
set -g status-position top
set -g status-interval 5
set -g status-style 'bg=#7aa2f7,fg=#0b0e14,bold'
set -g status-left  ' 🟢 LEFT=讲解  🟠 RIGHT=你的 Claude '
set -g status-right ' 鼠标点击切换 pane  │  F12 = 退出整个 demo '
set -g status-left-length 100
set -g status-right-length 100

# pane 边框：活跃窗蓝色，非活跃窗灰色
set -g pane-border-style 'fg=#565f89'
set -g pane-active-border-style 'fg=#7aa2f7,bold'
setw -g pane-border-status top
setw -g pane-border-format ' #{pane_index} · #{?pane_active,#[bold]●#[nobold],○} #{pane_title} '

# 单键退出：按 F12 = 杀整个 session
bind-key -n F12 confirm-before -p '真的要退出整个 demo 吗？(y/n)' kill-session

# 可选：Alt + 左右箭头切 pane（有些人习惯键盘）
bind-key -n M-Left  select-pane -L
bind-key -n M-Right select-pane -R

# 不要自动重命名 pane 标题
set -g allow-rename off
set -g automatic-rename off

# 让左 pane 的 tail -f 输出有合理间距
set -g history-limit 50000
